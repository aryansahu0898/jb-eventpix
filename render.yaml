services:
  - type: web
    name: jb-eventpix
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://jb-eventpix.onrender.com
      - key: ADMIN_NAME
        value: J.B. EventPix Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_MOBILE
        value: "9999999999"
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_SECURE
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FACE_MODEL_REMOTE_URL
        value: https://justadudewhohacks.github.io/face-api.js/models
      - key: FACE_DETECTION_TIMEOUT_MS
        value: "25000"
