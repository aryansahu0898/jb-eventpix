<!--
  events.html
  -----------
  Public event gallery with search and date filtering.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events | J.B. EventPix</title>
  <link rel="icon" type="image/jpeg" href="/assets/images/jb-eventpix-logo.jpeg">
  <link rel="apple-touch-icon" href="/assets/images/jb-eventpix-logo.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/gallery.css">
</head>
<body>
  <nav class="navbar">
    <div class="page-shell navbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">
          <img src="/assets/images/jb-eventpix-logo.jpeg" alt="">
        </span>
        <span class="brand-copy">
          <span class="brand-name">J.B. EventPix</span>
          <span class="brand-subtitle">Choose your event to begin</span>
        </span>
      </a>
      <div class="nav-actions">
        <button class="btn btn-outline theme-toggle" type="button" data-theme-toggle>Dark mode</button>
        <a class="btn btn-outline" href="/pages/login.html">Admin Login</a>
      </div>
    </div>
  </nav>

  <main class="page-shell gallery-shell">
    <section class="page-intro">
      <span class="eyebrow">Event gallery</span>
      <h1 class="section-title">Find the function you attended</h1>
      <p class="section-copy">
        Browse current and past school events, then start a camera or upload-based face scan to retrieve your photos.
      </p>
    </section>

    <section class="filters-bar">
      <div class="input-group">
        <label class="input-label" for="event-search">Search events</label>
        <input class="form-control" type="search" id="event-search" placeholder="Annual day, sports meet, farewell...">
      </div>
      <div class="input-group">
        <label class="input-label" for="event-date-filter">Filter by date</label>
        <input class="form-control" type="date" id="event-date-filter">
      </div>
    </section>

    <section class="events-grid" id="events-grid"></section>
    <section class="empty-state hidden" id="events-empty">
      <div class="empty-state-illustration"></div>
      <h2>No events match your filters</h2>
      <p>Try a different search term or clear the date filter.</p>
    </section>
  </main>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/events.js"></script>
</body>
</html>
